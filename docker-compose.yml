services:
  api:
    container_name: core_svc
    build: .
    env_file:
      - local.env
    ports:
      - "8080:8080"
    depends_on:
      postgres-svc:
        condition: service_healthy

  postgres-svc:
    container_name: postgres-svc
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gigpf
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d gigpf" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  default:
    external: true
    name: gig-platform
